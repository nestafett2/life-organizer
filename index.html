    document.getElementById('new-list-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') commitNewList();
      if (e.key === 'Escape') renderLists();
    });
  });

  if (lists.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'inbox-empty';
    empty.innerHTML = '<p class="inbox-empty-title">No lists yet</p><p>Tap + New list to create a grocery list, notes, or anything else.</p>';
    container.appendChild(empty);
    return;
  }

  lists.forEach(list => {
    const section = document.createElement('div');
    section.className = 'area-section';

    const hdr = document.createElement('div');
    hdr.className = 'area-header';

    // build linked label
    let linkedLabel = '';
    if (list.linkedProjectId) {
      const lp = proj(list.linkedProjectId);
      if (lp) linkedLabel = `<span style="font-size:11px;color:var(--accent);margin-left:6px">${lp.name}</span>`;
    } else if (list.linkedCategoryId) {
      const lc = AREAS.find(a => a.id === list.linkedCategoryId);
      if (lc) linkedLabel = `<span style="font-size:11px;color:var(--text-tertiary);margin-left:6px">${lc.name}</span>`;
    }

    const uncheckedItems = list.items.filter(i => !i.checked);
    const checkedItems = list.items.filter(i => i.checked);

    hdr.innerHTML = `
      <div class="area-header-left" style="gap:4px">
        <span class="area-name">${list.name}</span>
        ${linkedLabel}
        <span class="area-count" style="margin-left:4px">${uncheckedItems.length}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="list-link-btn" data-id="${list.id}" style="background:none;border:none;color:var(--text-tertiary);font-size:11px;cursor:pointer;font-family:DM Sans,sans-serif;padding:2px 6px;border-radius:6px;border:1px solid var(--border)">Link</button>
        <svg class="area-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`;

    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'area-projects';

    // Helper to build a list item row
    const buildItemRow = (item) => {
      // Ensure item has locationIds array
      if (!item.locationIds) item.locationIds = [];

      const row = document.createElement('div');
      row.className = 'project-row';
      row.style.cssText = 'padding-left:20px;flex-direction:column;align-items:stretch;gap:0';

      const mainRow = document.createElement('div');
      mainRow.style.cssText = 'display:flex;align-items:center;gap:12px;padding:2px 0';

      // Build location tags
      const locTags = item.locationIds.map(lid => {
        const loc = locations.find(l => l.id === lid);
        return loc ? `<span style="font-size:10px;color:#f06a6a;background:rgba(240,106,106,0.12);padding:1px 6px;border-radius:4px;white-space:nowrap">${loc.name}</span>` : '';
      }).filter(Boolean).join('');

      mainRow.innerHTML = `
        <div class="item-indicator" style="margin-top:0;flex-shrink:0"><div class="task-checkbox${item.checked ? ' checked' : ''}"></div></div>
        <div class="item-text-col" style="min-width:0">
          <div style="display:flex;align-items:center;gap:4px">
            <span class="project-name" style="font-size:22px;${item.checked ? 'text-decoration:line-through;color:var(--text-tertiary)' : ''}">${item.text}</span>
            ${item.note ? `<button class="item-note-toggle" style="background:none;border:none;cursor:pointer;padding:2px;color:var(--text-secondary);flex-shrink:0;display:flex;align-items:center;transition:transform 0.2s" title="Toggle note">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5l10 7-10 7z"/></svg>
            </button>` : ''}
          </div>
          ${locTags ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px">${locTags}</div>` : ''}
        </div>
        <div style="flex:1"></div>
        <button class="item-place-btn" style="background:none;border:none;cursor:pointer;padding:4px;color:${item.locationIds.length ? '#f06a6a' : 'var(--text-tertiary)'};flex-shrink:0;display:flex;align-items:center" title="Set locations">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </button>
        <button class="item-edit-btn" style="background:none;border:none;cursor:pointer;padding:4px;color:var(--text-tertiary);flex-shrink:0;display:flex;align-items:center" title="Edit item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>`;

      // Collapsible note area (hidden by default, only exists if note is non-empty)
      const noteRow = document.createElement('div');
      noteRow.className = 'item-note-row';
      noteRow.style.cssText = 'display:none;padding:2px 0 6px 32px;font-size:14px;color:var(--text-secondary);line-height:1.4';
      noteRow.textContent = item.note || '';

      // Note disclosure triangle toggle
      const noteToggle = mainRow.querySelector('.item-note-toggle');
      if (noteToggle) {
        noteToggle.addEventListener('click', e => {
          e.stopPropagation();
          const open = noteRow.style.display !== 'none';
          noteRow.style.display = open ? 'none' : 'block';
          noteToggle.style.transform = open ? '' : 'rotate(90deg)';
        });
      }

      // Checkbox — animate out instead of re-rendering
      mainRow.querySelector('.task-checkbox').addEventListener('click', e => {
        e.stopPropagation();
        item.checked = !item.checked;
        save();
        row.style.transition = 'opacity 0.25s, max-height 0.25s';
        row.style.opacity = '0';
        row.style.maxHeight = row.offsetHeight + 'px';
        row.style.overflow = 'hidden';
        setTimeout(() => {
          row.style.maxHeight = '0';
        }, 50);
        setTimeout(() => {
          row.remove();
          const countEl = hdr.querySelector('.area-count');
          if (countEl) countEl.textContent = list.items.filter(i => !i.checked).length;
          updateCheckedSection();
        }, 300);
      });

      mainRow.querySelector('.item-place-btn').addEventListener('click', e => {
        e.stopPropagation();
        showItemLocationPicker(item, () => renderLists());
      });

      // Edit button — opens bottom sheet for name + note editing
      mainRow.querySelector('.item-edit-btn').addEventListener('click', e => {
        e.stopPropagation();
        showItemEditSheet(item, () => {
          // Update display in-place
          mainRow.querySelector('.project-name').textContent = item.text;
          mainRow.querySelector('.project-name').style.cssText = 'font-size:22px;' + (item.checked ? 'text-decoration:line-through;color:var(--text-tertiary)' : '');
          // Update note row and toggle visibility
          noteRow.textContent = item.note || '';
          if (item.note) {
            if (!mainRow.querySelector('.item-note-toggle')) {
              // Insert triangle next to name text
              const tri = document.createElement('button');
              tri.className = 'item-note-toggle';
              tri.style.cssText = 'background:none;border:none;cursor:pointer;padding:2px;color:var(--text-secondary);flex-shrink:0;display:flex;align-items:center;transition:transform 0.2s';
              tri.title = 'Toggle note';
              tri.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5l10 7-10 7z"/></svg>';
              tri.addEventListener('click', ev => {
                ev.stopPropagation();
                const open = noteRow.style.display !== 'none';
                noteRow.style.display = open ? 'none' : 'block';
                tri.style.transform = open ? '' : 'rotate(90deg)';
              });
              mainRow.querySelector('.project-name').after(tri);
            }
          } else {
            // Remove triangle if note was cleared
            const tri = mainRow.querySelector('.item-note-toggle');
            if (tri) tri.remove();
            noteRow.style.display = 'none';
          }
        });
      });

      row.appendChild(mainRow);
      row.appendChild(noteRow);
      return row;
    };

    // Render unchecked items
    uncheckedItems.forEach(item => itemsDiv.appendChild(buildItemRow(item)));

    // add item row — inline input, stays open after adding
    const addRow = document.createElement('div');
    addRow.className = 'project-row';
    addRow.style.cssText = 'padding-left:20px;gap:8px;cursor:pointer;color:var(--text-tertiary)';
    addRow.innerHTML = `<span class="add-item-label" style="font-size:14px">+ Add item</span>
      <input class="add-item-input" type="text" placeholder="New item…" autocomplete="off"
        style="display:none;flex:1;background:none;border:none;outline:none;font-family:DM Sans,sans-serif;font-size:21px;color:var(--text-primary);padding:0">`;

    const addLabel = addRow.querySelector('.add-item-label');
    const addInput = addRow.querySelector('.add-item-input');
    let addItemCommitting = false;

    addLabel.addEventListener('click', () => {
      addLabel.style.display = 'none';
      addInput.style.display = 'block';
      addInput.focus();
    });

    const commitAddItem = () => {
      if (addItemCommitting) return;
      addItemCommitting = true;
      const text = addInput.value.trim();
      if (text) {
        list.items.push({ text, checked: false, note: '', locationIds: [] });
        save();
        const newRow = buildItemRow(list.items[list.items.length - 1]);
        itemsDiv.insertBefore(newRow, addRow);
        const countEl = hdr.querySelector('.area-count');
        if (countEl) countEl.textContent = list.items.filter(i => !i.checked).length;
        addInput.value = '';
        addInput.focus();
      } else {
        addInput.style.display = 'none';
        addLabel.style.display = '';
        addInput.value = '';
      }
      addItemCommitting = false;
    };

    addInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); commitAddItem(); }
      if (e.key === 'Escape') { addInput.style.display='none'; addLabel.style.display=''; addInput.value=''; }
    });
    addInput.addEventListener('blur', commitAddItem);

    itemsDiv.appendChild(addRow);

    // Checked items — collapsible section (rebuilt dynamically)
    const checkedToggle = document.createElement('div');
    const checkedDiv = document.createElement('div');
    checkedDiv.style.display = 'none';
    let checkedOpen = false;

    const updateCheckedSection = () => {
      const currentChecked = list.items.filter(i => i.checked);
      if (currentChecked.length === 0) {
        checkedToggle.style.display = 'none';
        checkedDiv.style.display = 'none';
        return;
      }
      checkedToggle.style.display = '';
      checkedToggle.style.cssText = 'padding:8px 20px;display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text-tertiary);font-size:13px;font-family:DM Sans,sans-serif';
      checkedToggle.innerHTML = `<svg class="checked-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform 0.2s;${checkedOpen ? 'transform:rotate(90deg)' : ''}"><polyline points="9 18 15 12 9 6"/></svg>
        <span>${checkedOpen ? 'Hide' : 'Show'} checked items · ${currentChecked.length}</span>`;
      checkedDiv.innerHTML = '';
      currentChecked.forEach(item => checkedDiv.appendChild(buildItemRow(item)));
      checkedDiv.style.display = checkedOpen ? 'block' : 'none';
    };

    checkedToggle.addEventListener('click', () => {
      checkedOpen = !checkedOpen;
      updateCheckedSection();
      if (checkedOpen) {
        checkedDiv.querySelectorAll('.list-item-note').forEach(ta => {
          ta.style.height = 'auto';
          ta.style.height = ta.scrollHeight + 'px';
        });
      }
    });

    itemsDiv.appendChild(checkedToggle);
    itemsDiv.appendChild(checkedDiv);
    updateCheckedSection();

    hdr.addEventListener('click', (e) => {
      if (e.target.closest('.list-link-btn')) return;
      hdr.querySelector('.area-chevron').classList.toggle('open');
      itemsDiv.classList.toggle('open');
      if (itemsDiv.classList.contains('open')) {
        itemsDiv.querySelectorAll('.list-item-note').forEach(ta => {
          ta.style.height = 'auto';
          ta.style.height = ta.scrollHeight + 'px';
        });
      }
    });

    hdr.querySelector('.list-link-btn').addEventListener('click', e => {
      e.stopPropagation();
      showListLinkPicker(list, section);
    });

    section.appendChild(hdr);
    section.appendChild(itemsDiv);
    container.appendChild(section);
  });

}

// ── CATEGORY / PROJECT EDIT SHEET ─────────────────────────────────────────────

const CAT_COLORS = ['#5b9cf6','#f0883e','#4caf80','#b07ef8','#f06a6a','#f6c85b','#4ecdc4','#e84393'];

function openCategorySheet(existing) {
  // existing = null → create new, else edit
  const isNew = !existing;
  const data  = existing || { id: null, name: '', color: CAT_COLORS[0] };

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:600;display:flex;align-items:flex-end';

  const sheet = document.createElement('div');
  sheet.style.cssText = `width:100%;max-width:430px;margin:0 auto;background:var(--surface);
    border-radius:20px 20px 0 0;padding:20px 20px calc(env(safe-area-inset-bottom,0px)+20px);
    animation:slideUp 0.28s cubic-bezier(0.32,0.72,0,1)`;

  const colorSwatches = CAT_COLORS.map(c =>
    `<div class="color-swatch${c===data.color?' selected':''}" data-color="${c}"
      style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;
             flex-shrink:0;border:2px solid ${c===data.color?'white':'transparent'};
             transition:border-color 0.15s"></div>`
  ).join('');

  sheet.innerHTML = `
    <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px"></div>
    <div style="font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;
                color:var(--text-tertiary);margin-bottom:12px">${isNew?'New Category':'Edit Category'}</div>
    <input id="cat-name-input" type="text" value="${data.name}" placeholder="Category name"
      style="width:100%;background:var(--surface-raised);border:1px solid var(--border);border-radius:10px;
             padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text-primary);
             outline:none;margin-bottom:16px">
    <div style="font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;
                color:var(--text-tertiary);margin-bottom:10px">Color</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px">${colorSwatches}</div>
    <div style="display:flex;gap:10px;${isNew?'':'justify-content:space-between'}">
      ${!isNew ? `<button id="cat-delete-btn" style="background:none;border:none;color:var(--overdue);
        font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;padding:8px 0">Delete category</button>` : ''}
      <div style="display:flex;gap:10px;margin-left:auto">
        <button id="cat-cancel-btn" style="background:none;border:none;color:var(--text-secondary);
          font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;padding:10px 4px">Cancel</button>
        <button id="cat-save-btn" style="background:var(--accent);color:#0a1f14;border:none;border-radius:10px;
          padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer">
          ${isNew?'Add':'Save'}</button>
      </div>
    </div>`;

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  document.getElementById('cat-name-input').focus();

  // color picker
  let selectedColor = data.color;
  sheet.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      sheet.querySelectorAll('.color-swatch').forEach(s => {
        s.style.borderColor = 'transparent';
      });
      sw.style.borderColor = 'white';
      selectedColor = sw.dataset.color;
    });
  });

  document.getElementById('cat-cancel-btn').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target===overlay) overlay.remove(); });

  document.getElementById('cat-save-btn').addEventListener('click', () => {
    const name = document.getElementById('cat-name-input').value.trim();
    if (!name) { document.getElementById('cat-name-input').focus(); return; }
    if (isNew) {
      AREAS.push({ id: 'a'+Date.now(), name, color: selectedColor });
    } else {
      data.name  = name;
      data.color = selectedColor;
    }
    save();
    overlay.remove();
    renderCategories();
  });

  if (!isNew) {
    document.getElementById('cat-delete-btn').addEventListener('click', () => {
      if (!confirm(`Delete "${data.name}" and all its projects? Tasks will become uncategorised.`)) return;
      // remove projects in this area
      const projIds = PROJECTS.filter(p=>p.areaId===data.id).map(p=>p.id);
      projIds.forEach(pid => {
        tasks.forEach(t => { if(t.projectId===pid) t.projectId=null; });
        const i = PROJECTS.findIndex(p=>p.id===pid);
        if(i!==-1) PROJECTS.splice(i,1);
      });
      tasks.forEach(t => { /* tasks already cleared above */ });
      const i = AREAS.findIndex(a=>a.id===data.id);
      if(i!==-1) AREAS.splice(i,1);
      save();
      overlay.remove();
      renderCategories();
    });
  }

  document.getElementById('cat-name-input').addEventListener('keydown', e => {
    if (e.key==='Enter') document.getElementById('cat-save-btn').click();
    if (e.key==='Escape') overlay.remove();
  });
}

    animation:slideUp 0.28s cubic-bezier(0.32,0.72,0,1)`;

    `<option value="${a.id}" ${a.id===data.areaId?'selected':''}>${a.name}</option>`

      border-radius:10px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;

        font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;padding:8px 0">Delete project</button>` : ''}
      <div style="display:flex;gap:10px;margin-left:auto">
        <button id="proj-cancel-btn" style="background:none;border:none;color:var(--text-secondary);
          font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;padding:10px 4px">Cancel</button>
        <button id="proj-save-btn" style="background:var(--accent);color:#0a1f14;border:none;border-radius:10px;
          padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer">
          ${isNew?'Add':'Save'}</button>
      </div>
    </div>`;

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  document.getElementById('proj-name-input').focus();

  document.getElementById('proj-cancel-btn').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.remove(); });

  document.getElementById('proj-save-btn').addEventListener('click', () => {
    const name   = document.getElementById('proj-name-input').value.trim();
    const areaId = document.getElementById('proj-area-select').value;
    if (!name) { document.getElementById('proj-name-input').focus(); return; }
    if (isNew) {
      PROJECTS.push({ id: 'p'+Date.now(), name, areaId, done: 0, total: 0 });
    } else {
      data.name   = name;
      data.areaId = areaId;
    }
    save();
    overlay.remove();
    renderCategories();
  });

  if (!isNew) {
    document.getElementById('proj-delete-btn').addEventListener('click', () => {
      if (!confirm(`Delete "${data.name}"? Its tasks will become uncategorised.`)) return;
      tasks.forEach(t => { if(t.projectId===data.id) t.projectId=null; });
      const i = PROJECTS.findIndex(p=>p.id===data.id);
      if(i!==-1) PROJECTS.splice(i,1);
      save();
      overlay.remove();
      renderCategories();
    });
  }

  document.getElementById('proj-name-input').addEventListener('keydown', e => {
    if (e.key==='Enter') document.getElementById('proj-save-btn').click();

  });
}

// ── CATEGORIES ────────────────────────────────────────────────────────────────

function renderCategories() {
  const container = document.getElementById('categories-list');
  container.innerHTML = '';

  // Header row with + New Category button
  const hdrRow = document.createElement('div');
  hdrRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:20px 20px 8px';
  hdrRow.innerHTML = `
    <span style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-tertiary)">Categories</span>
    <button id="add-cat-btn" style="background:none;border:none;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;padding:4px 0">+ New category</button>`;
  container.appendChild(hdrRow);
  document.getElementById('add-cat-btn').addEventListener('click', () => openCategorySheet(null));

  AREAS.forEach(a => {
    const areaProjects = PROJECTS.filter(p => p.areaId === a.id);
    const totalTasks = areaProjects.reduce((s, p) => s + p.total, 0);
    const doneTasks  = areaProjects.reduce((s, p) => s + p.done, 0);

    const section = document.createElement('div');
    section.className = 'area-section';

    const areaHdr = document.createElement('div');
    areaHdr.className = 'area-header';
    areaHdr.innerHTML = `
      <div class="area-header-left">
        <div class="area-color" style="background:${a.color}"></div>
        <span class="area-name">${a.name}</span>
        <span class="area-count">${areaProjects.length} project${areaProjects.length!==1?'s':''}</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="cat-edit-btn" data-id="${a.id}"
          style="background:none;border:none;color:var(--text-tertiary);padding:4px 8px;cursor:pointer;
                 border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px">Edit</button>

// ── UPCOMING ──────────────────────────────────────────────────────────────────

function renderUpcoming() {
  const container = document.getElementById('upcoming-list');
  container.innerHTML = '';

  for (let i = 1; i <= 7; i++) {
    const dt = new Date(today);
    dt.setDate(today.getDate() + i);

    const dayTasks  = tasks.filter(t => t.due && isSameDay(t.due, dt) && !t.done);
    const dayEvents = events.filter(e => isSameDay(e.start, dt));

    if (!dayTasks.length && !dayEvents.length) continue;

    const dateHdr = document.createElement('div');
    dateHdr.className = 'upcoming-date-header';
    const isThisWeek = i <= 7;
    const weekday = dt.toLocaleDateString('en-US', { weekday: 'long' });
    const dateStr  = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    dateHdr.innerHTML = `<div class="date-label">${weekday}</div><div class="date-sub">${dateStr}</div>`;
    container.appendChild(dateHdr);

    const sorted = [...dayEvents.sort((a,b)=>a.start-b.start), ...dayTasks];
    sorted.forEach(item => {
      if (item.type === 'event') container.appendChild(makeEventRow(item));
      else container.appendChild(makeTaskRow(item, false));
    });
  }
}

function renderSomedayView() {
  const container = document.getElementById('someday-list');

// ── PROJECTS VIEW (mobile) ───────────────────────────────────────────────────

function renderProjectsView() {
  const container = document.getElementById('projects-list');
  container.innerHTML = '';

  const hdr = document.createElement('div');
  hdr.style.cssText = 'padding:24px 20px 4px';
  hdr.innerHTML = '<h2 style="font-size:24px;font-weight:600;letter-spacing:-0.5px;color:var(--text-primary)">Projects</h2>';
  container.appendChild(hdr);

  if (PROJECTS.length === 0) {
    container.innerHTML += '<div class="inbox-empty"><p class="inbox-empty-title">No projects yet</p><p>Create projects inside Categories to see them here.</p></div>';
    return;
  }

  // Group projects by area
  const ungrouped = [];
  const areaMap = new Map();
  PROJECTS.forEach(p => {
    const area = p.areaId ? AREAS.find(a => a.id === p.areaId) : null;
    if (area) {
      if (!areaMap.has(area.id)) areaMap.set(area.id, { area, projects: [] });
      areaMap.get(area.id).projects.push(p);
    } else {
      ungrouped.push(p);
    }
  });

  const renderGroup = (label, color, projects) => {
    const section = document.createElement('div');
    section.style.cssText = 'margin-bottom:8px';

    const groupHdr = document.createElement('div');
    groupHdr.className = 'section-header';
    groupHdr.style.cssText = 'display:flex;align-items:center;gap:8px;padding:16px 20px 6px';
    groupHdr.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${color || 'var(--text-tertiary)'};flex-shrink:0"></span><span>${label}</span>`;
    section.appendChild(groupHdr);

    projects.forEach(p => {
      const projTasks = tasks.filter(t => t.projectId === p.id);
      const remaining = projTasks.filter(t => !t.done).length;
      const total = projTasks.length;

      const row = document.createElement('div');
      row.className = 'project-row';
      row.style.cssText = 'padding:10px 20px;display:flex;align-items:center;gap:12px;cursor:pointer';
      row.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.8" style="flex-shrink:0"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span style="flex:1;font-size:16px;color:var(--text-primary)">${p.name}</span>
        <span style="font-size:13px;color:var(--text-tertiary)">${remaining}${total ? ' / ' + total : ''}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2" style="flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>`;

      row.addEventListener('click', () => openMobileProject(p));
      section.appendChild(row);
    });

    container.appendChild(section);
  };

  areaMap.forEach(({ area, projects }) => renderGroup(area.name, area.color, projects));
  if (ungrouped.length) renderGroup('Uncategorized', null, ungrouped);
}

function openMobileProject(project) {
  const area = project.areaId ? AREAS.find(a => a.id === project.areaId) : null;
  const container = document.getElementById('projects-list');
  container.innerHTML = '';

  // Back button + header
  const hdr = document.createElement('div');
  hdr.style.cssText = 'padding:20px 20px 4px;display:flex;align-items:center;gap:12px';
  hdr.innerHTML = `
    <button id="proj-back" style="background:none;border:none;cursor:pointer;padding:4px;color:var(--text-secondary);line-height:0">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div>
      <h2 style="font-size:22px;font-weight:600;letter-spacing:-0.3px;color:var(--text-primary)">${project.name}</h2>
      ${area ? `<div style="font-size:13px;color:var(--text-tertiary)">${area.name}</div>` : ''}
    </div>`;
  container.appendChild(hdr);

  hdr.querySelector('#proj-back').addEventListener('click', () => renderProjectsView());

  const projTasks = tasks.filter(t => t.projectId === project.id);
  const active = projTasks.filter(t => !t.done);
  const done = projTasks.filter(t => t.done);

  if (active.length === 0 && done.length === 0) {
    container.innerHTML += '<div class="inbox-empty"><p class="inbox-empty-title">No tasks yet</p><p>Add tasks to this project from the Inbox or Today view.</p></div>';
    return;
  }

  active.forEach(t => container.appendChild(makeTaskRow(t, false)));

  if (done.length) {
    const doneHdr = document.createElement('div');
    doneHdr.className = 'section-header';
    doneHdr.textContent = 'Completed \u00b7 ' + done.length;
    container.appendChild(doneHdr);
    done.forEach(t => container.appendChild(makeTaskRow(t, false)));
  }
}

const DEFAULT_NAV_CONFIG = [
  { id: 'today',      visible: false },
  { id: 'inbox',      visible: false },
  { id: 'lists',      visible: true },
  { id: 'places',     visible: true },
  { id: 'upcoming',   visible: false },
  { id: 'categories', visible: false },
  { id: 'projects',   visible: false },
  { id: 'someday',    visible: false },
];

function getNavConfig() {
  try {
    const raw = localStorage.getItem('lo_nav_config');
    if (raw) {
      const parsed = JSON.parse(raw);
      // Ensure all known tabs are present (in case new ones are added later)
      const ids = parsed.map(t => t.id);
      for (const def of DEFAULT_NAV_CONFIG) {
        if (!ids.includes(def.id)) parsed.push({ ...def });
      }
      return parsed.filter(t => NAV_TABS[t.id]);
    }
  } catch(e) {}
  return DEFAULT_NAV_CONFIG.map(t => ({ ...t }));
}

function saveNavConfig(config) {
  localStorage.setItem('lo_nav_config', JSON.stringify(config));
}

function buildNavBar() {
  const nav = document.getElementById('top-nav');
  nav.innerHTML = '';
  const config = getNavConfig();

  // Determine which tab should be active
  const currentActive = document.querySelector('.view.active');
  const currentViewId = currentActive ? currentActive.id.replace('view-', '') : null;
  const visibleTabs = config.filter(t => t.visible);

  // Find the first visible tab to default to if current isn't visible
  let activeId = currentViewId;
  if (!visibleTabs.find(t => t.id === activeId)) {
    activeId = visibleTabs.length ? visibleTabs[0].id : null;
  }

  config.forEach(t => {
    if (!t.visible) return;
    const def = NAV_TABS[t.id];
    if (!def) return;
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (t.id === activeId ? ' active' : '');
    btn.dataset.view = t.id;
    btn.innerHTML = def.svg + def.label;
    btn.addEventListener('click', () => {
      nav.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      const view = document.getElementById('view-' + t.id);
      if (view) view.classList.add('active');
      switch(t.id) {
        case 'today':      buildWeekStrip(); renderTodayList(); break;
        case 'inbox':      renderInbox(); break;
        case 'lists':      renderLists(); break;
        case 'categories': renderCategories(); break;
        case 'projects':   renderProjectsView(); break;
        case 'places':     renderPlaces(); break;
        case 'upcoming':   renderUpcoming(); break;
        case 'someday':    renderSomedayView(); break;
      }
    });
    nav.appendChild(btn);
  });

  // Always-present settings gear
  const gearBtn = document.createElement('button');
  gearBtn.className = 'nav-tab';
  gearBtn.id = 'settings-btn';
  gearBtn.style.cssText = 'flex:0;padding:14px 14px;';
  gearBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="20" height="20" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';
  gearBtn.addEventListener('click', () => {
    if (isDesktop()) { switchDesktopView('settings'); return; }
    const isOpen = document.getElementById('view-settings').classList.contains('active');
    if (isOpen) {
      // Go back to first visible tab
      const first = nav.querySelector('.nav-tab[data-view]');
      if (first) first.click();
      return;
    }
    nav.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    gearBtn.classList.add('active');
    document.getElementById('view-settings').classList.add('active');
    renderSettings();
  });
  nav.appendChild(gearBtn);

  // Activate the correct view
  if (activeId && activeId !== currentViewId) {
    const tabBtn = nav.querySelector(`.nav-tab[data-view="${activeId}"]`);
    if (tabBtn) tabBtn.click();
  }
}

buildNavBar();

// ── QUICK ADD ─────────────────────────────────────────────────────────────────

const overlay   = document.getElementById('quick-add-overlay');
const input     = document.getElementById('quick-add-input');
const submitBtn = document.getElementById('qa-submit');

const addBtn = document.getElementById('btn-add');
const captureBar = document.getElementById('capture-bar');

function collapseCaptureBar() {
  captureBar.classList.remove('expanded');
  addBtn.classList.remove('expanded');
}

addBtn.addEventListener('click', () => {
  const isExpanded = captureBar.classList.contains('expanded');
  if (isExpanded) {
    collapseCaptureBar();
  } else {
    captureBar.classList.add('expanded');
    addBtn.classList.add('expanded');
  }
});

// Collapse fan-out when tapping outside
document.addEventListener('click', e => {
  if (captureBar.classList.contains('expanded') && !captureBar.contains(e.target)) {
    collapseCaptureBar();
  }
});

document.getElementById('btn-type').addEventListener('click', () => {
  collapseCaptureBar();
  overlay.classList.add('open');
  setTimeout(() => input.focus(), 100);
});

document.getElementById('qa-cancel').addEventListener('click', closeQuickAdd);

overlay.addEventListener('click', e => {
  if (e.target === overlay) closeQuickAdd();
});

input.addEventListener('input', () => {
  submitBtn.disabled = input.value.trim() === '';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && input.value.trim()) submitTask();
});

submitBtn.addEventListener('click', submitTask);

function submitTask() {
  const text = input.value.trim();
  if (!text) return;
  inboxItems.push({ id: 'i' + Date.now(), title: text, type: 'task', done: false, notes: '' });
  save();
  closeQuickAdd();
  const inboxTab = document.querySelector('[data-view="inbox"]');
  if (inboxTab) inboxTab.click();
}

function closeQuickAdd() {
  overlay.classList.remove('open');
  input.value = '';
  submitBtn.disabled = true;
}

// ── VOICE INPUT ───────────────────────────────────────────────────────────────

const voiceBtn = document.getElementById('btn-voice');
let recognition = null;

voiceBtn.addEventListener('click', () => {
  collapseCaptureBar();

  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Voice input is not supported in this browser. Try Chrome or Safari.');
    return;
  }

  if (voiceBtn.classList.contains('listening')) {
    recognition && recognition.stop();
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;

  voiceBtn.classList.add('listening');

  recognition.onresult = e => {
    const text = e.results[0][0].transcript;
    input.value = text;
    submitBtn.disabled = false;
    overlay.classList.add('open');
    voiceBtn.classList.remove('listening');
  };

  recognition.onerror = recognition.onend = () => {
    voiceBtn.classList.remove('listening');
  };

  recognition.start();
});

// ── TASK DETAIL SHEET ─────────────────────────────────────────────────────────

const tdOverlay  = document.getElementById('task-detail-overlay');
const tdSheet    = document.getElementById('task-detail-sheet');
let   editingTask = null;

function openTaskDetail(task) {
  editingTask = task;

  // Populate fields
  const titleEl = document.getElementById('td-title');
  titleEl.value = task.title;
  // force height recalc after value is set
  titleEl.style.height = 'auto';
  titleEl.style.height = titleEl.scrollHeight + 'px';

  // Done state
  updateTdDoneBtn(task.done);

  // Date
  const dateInput = document.getElementById('td-date-input');
  const dateValue = document.getElementById('td-date-value');
  const datePicker = document.getElementById('td-date-picker');
  datePicker.classList.remove('open');

  if (task.due) {
    const d = task.due;
    const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    dateInput.value = iso;
    dateValue.textContent = fmtDateShort(task.due);
    dateValue.className = `td-field-value${isPast(task.due) && !task.done ? ' overdue' : ' accent'}`;
  } else {
    dateInput.value = '';
    dateValue.textContent = 'No date';
    dateValue.className = 'td-field-value placeholder';
  }

  // Project
  buildProjectPicker(task.projectId);

  // Priority
  document.getElementById('td-priority-toggle').checked = !!task.priority;

  // Notes
  document.getElementById('td-notes').value = task.notes || '';

  tdOverlay.classList.add('open');
  setTimeout(() => titleEl.focus(), 150);
}

function updateTdDoneBtn(done) {
  const btn = document.getElementById('td-done-btn');
  const label = document.getElementById('td-done-label');
  btn.classList.toggle('completed', done);
  label.textContent = done ? 'Completed' : 'Mark complete';
}

function buildProjectPicker(selectedId) {
  const picker = document.getElementById('td-project-picker');
  const valueEl = document.getElementById('td-project-value');

  picker.innerHTML = '';

  // No project option
  const noneOpt = document.createElement('div');
  noneOpt.className = `td-project-option${!selectedId ? ' selected' : ''}`;
  noneOpt.innerHTML = `<div class="td-project-dot" style="background:var(--text-tertiary)"></div> No project`;
  noneOpt.addEventListener('click', () => {
    editingTask.projectId = null;
    valueEl.textContent = 'No project';
    valueEl.className = 'td-field-value placeholder';
    picker.classList.remove('open');
    buildProjectPicker(null);
  });
  picker.appendChild(noneOpt);

  PROJECTS.forEach(p => {
    const a = area(AREAS.find(ar => ar.id === p.areaId)?.id);
    const aObj = AREAS.find(ar => ar.id === p.areaId);
    const opt = document.createElement('div');
    opt.className = `td-project-option${selectedId === p.id ? ' selected' : ''}`;
    opt.innerHTML = `<div class="td-project-dot" style="background:${aObj?.color || 'var(--text-tertiary)'}"></div>${p.name}`;
    opt.addEventListener('click', () => {
      editingTask.projectId = p.id;
      valueEl.textContent = p.name;
      valueEl.className = 'td-field-value accent';
      picker.classList.remove('open');
      buildProjectPicker(p.id);
    });
    picker.appendChild(opt);
  });

  // Update display value
  if (selectedId) {
    const p = proj(selectedId);
    if (p) {
      valueEl.textContent = p.name;
      valueEl.className = 'td-field-value accent';
    }
  } else {
    valueEl.textContent = 'No project';
    valueEl.className = 'td-field-value placeholder';
  }
}

function closeTaskDetail() {
  tdOverlay.classList.remove('open');
  editingTask = null;
}

function saveTaskDetail() {
  if (!editingTask) return;

  const title = document.getElementById('td-title').value.trim();
  if (!title) return;

  editingTask.title    = title;
  editingTask.priority = document.getElementById('td-priority-toggle').checked;
  editingTask.notes    = document.getElementById('td-notes').value.trim();

  const dateVal = document.getElementById('td-date-input').value;
  if (dateVal) {
    const [y,m,d] = dateVal.split('-').map(Number);
    editingTask.due = new Date(y, m-1, d);
  } else {
    editingTask.due = null;
  }

  save();
  closeTaskDetail();
  refreshCurrentView();
}

function deleteTask() {
  if (!editingTask) return;
  const idx = tasks.findIndex(t => t.id === editingTask.id);
  if (idx !== -1) tasks.splice(idx, 1);
  const iIdx = inboxItems.findIndex(t => t.id === editingTask.id);
  if (iIdx !== -1) inboxItems.splice(iIdx, 1);
  save();
  closeTaskDetail();
  refreshCurrentView();
}

function refreshCurrentView() {
  const activeTab = document.querySelector('.nav-tab.active');
  if (!activeTab) return;
  switch(activeTab.dataset.view) {
    case 'today':    buildWeekStrip(); renderTodayList(); break;
    case 'inbox':    renderInbox(); break;
    case 'lists': renderLists(); break;
    case 'categories':    renderCategories(); break;
    case 'places':   renderPlaces(); break;
    case 'upcoming': renderUpcoming(); break;
  }
}

function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function isPast(dt) {
  return dt < today && !isSameDay(dt, today);
}

function fmtDateShort(dt) {
  if (isSameDay(dt, today)) return 'Today';
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  if (isSameDay(dt, tomorrow)) return 'Tomorrow';
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

document.getElementById('td-close').addEventListener('click', closeTaskDetail);
document.getElementById('td-save').addEventListener('click', saveTaskDetail);
document.getElementById('td-delete').addEventListener('click', deleteTask);

document.getElementById('td-done-btn').addEventListener('click', () => {
  if (!editingTask) return;

});

document.getElementById('td-title').addEventListener('input', function() {

});

function applyUIMode() {
  const full = isFullMode();
  // Rebuild mobile nav to reflect visibility
  buildNavBar();
  // Desktop sidebar items to hide in lists-only mode
  const hideDeskViews = ['today', 'inbox', 'upcoming', 'someday'];
  document.querySelectorAll('.sb-item[data-desktop-view]').forEach(el => {
    if (hideDeskViews.includes(el.dataset.desktopView)) {
      el.style.display = full ? '' : 'none';
    }
  });
  // Hide areas/projects section and its surrounding dividers
  const sbAreas = document.getElementById('sb-areas');
  if (sbAreas) sbAreas.style.display = full ? '' : 'none';
  // Hide dividers around areas section
  document.querySelectorAll('#desktop-sidebar .sb-divider').forEach(d => {
    d.style.display = full ? '' : 'none';
  });
  // Hide "New To-Do" button in lists-only mode
  const sbNewBtn = document.getElementById('sb-new-btn');
  if (sbNewBtn) sbNewBtn.style.display = full ? '' : 'none';
  // Hide floating + and mic buttons in lists-only mode
  const captureBar = document.getElementById('capture-bar');
  if (captureBar) captureBar.style.display = full ? '' : 'none';
  // Switch to lists view if current view is hidden
  if (!full) {
    if (isDesktop()) {
      if (hideDeskViews.includes(desktopView) || desktopView.startsWith('project:') || desktopView.startsWith('category:')) {
        switchDesktopView('lists');
      }
    } else {
      const activeTab = document.querySelector('.nav-tab.active');
      if (activeTab && hideViews.includes(activeTab.dataset.view)) {
        const listsTab = document.querySelector('.nav-tab[data-view="lists"]');
        if (listsTab) listsTab.click();
      }
    }
  }
}

    showSettingsToast('CSV exported');
  });

  document.getElementById('s-clear-row').addEventListener('click', () => {
    if (!confirm('Delete ALL tasks, inbox items, lists and categories? This cannot be undone.')) return;
    tasks.length = 0;
    inboxItems.length = 0;
    lists.length = 0;
    AREAS.length = 0;
    PROJECTS.length = 0;
    save();
    showSettingsToast('All data cleared');
  });

  // ── Navigation config rows ──
  const navList = document.getElementById('s-nav-list');
  const navConfig = getNavConfig();
  let dragSrcIdx = null;

  function renderNavRows() {
    navList.innerHTML = '';
    navConfig.forEach((item, idx) => {
      const def = NAV_TABS[item.id];
      if (!def) return;
      const row = document.createElement('div');
      row.draggable = true;
      row.dataset.idx = idx;
      row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:grab;user-select:none;transition:background 0.15s;';
      row.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2" style="flex-shrink:0;opacity:0.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <span style="flex:1;font-size:15px;color:var(--text-primary)">${def.label}</span>
        <label class="td-toggle" style="margin:0">
          <input type="checkbox" data-nav-id="${item.id}" ${item.visible ? 'checked' : ''}>
          <div class="td-toggle-track"></div>
        </label>`;

      // Toggle handler
      row.querySelector('input[type="checkbox"]').addEventListener('change', (e) => {
        item.visible = e.target.checked;
        saveNavConfig(navConfig);
        buildNavBar();
      });

      // Drag handlers
      row.addEventListener('dragstart', (e) => {
        dragSrcIdx = idx;
        row.style.opacity = '0.5';
        e.dataTransfer.effectAllowed = 'move';
      });
      row.addEventListener('dragend', () => {
        row.style.opacity = '1';
        navList.querySelectorAll('[data-idx]').forEach(r => r.style.background = '');
      });
      row.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        row.style.background = 'rgba(255,255,255,0.04)';
      });
      row.addEventListener('dragleave', () => {
        row.style.background = '';
      });
      row.addEventListener('drop', (e) => {
        e.preventDefault();
        if (dragSrcIdx === null || dragSrcIdx === idx) return;
        const moved = navConfig.splice(dragSrcIdx, 1)[0];
        navConfig.splice(idx, 0, moved);
        saveNavConfig(navConfig);
        buildNavBar();
        renderNavRows();
      });

      // Touch drag support
      let touchStartY = 0;
      let touchClone = null;
      let touchMoveIdx = idx;
      row.addEventListener('touchstart', (e) => {
        dragSrcIdx = idx;
        touchStartY = e.touches[0].clientY;
        touchClone = row.cloneNode(true);
        touchClone.style.cssText = row.style.cssText + 'position:fixed;left:0;right:0;z-index:9999;background:var(--surface-raised);box-shadow:0 4px 20px rgba(0,0,0,0.3);pointer-events:none;';
        touchClone.style.top = row.getBoundingClientRect().top + 'px';
        document.body.appendChild(touchClone);
        row.style.opacity = '0.3';
      }, { passive: true });
      row.addEventListener('touchmove', (e) => {
        if (!touchClone) return;
        e.preventDefault();
        const touch = e.touches[0];
        touchClone.style.top = (row.getBoundingClientRect().top + touch.clientY - touchStartY) + 'px';
        // Find which row we're over
        const rows = [...navList.querySelectorAll('[data-idx]')];
        rows.forEach(r => r.style.background = '');
        for (const r of rows) {
          const rect = r.getBoundingClientRect();
          if (touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
            r.style.background = 'rgba(255,255,255,0.04)';
            touchMoveIdx = parseInt(r.dataset.idx);
            break;
          }
        }
      }, { passive: false });
      row.addEventListener('touchend', () => {
        if (touchClone) {
          touchClone.remove();
          touchClone = null;
        }
        row.style.opacity = '1';
        navList.querySelectorAll('[data-idx]').forEach(r => r.style.background = '');
        if (dragSrcIdx !== null && dragSrcIdx !== touchMoveIdx) {
          const moved = navConfig.splice(dragSrcIdx, 1)[0];
          navConfig.splice(touchMoveIdx, 0, moved);
          saveNavConfig(navConfig);
          buildNavBar();
          renderNavRows();
        }
        dragSrcIdx = null;
      });

      navList.appendChild(row);
    });
  }
  renderNavRows();
}

let settingsToastTimer = null;
function showSettingsToast(msg) {
  let toast = document.getElementById('settings-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'settings-toast';
    toast.style.cssText = `position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
      background:var(--surface-raised);border:1px solid var(--border);color:var(--text-primary);
      font-size:13px;padding:10px 18px;border-radius:20px;z-index:9999;
      box-shadow:0 4px 20px rgba(0,0,0,0.3);transition:opacity 0.3s;white-space:nowrap`;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(settingsToastTimer);
  settingsToastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
}

// Settings gear button is wired up inside buildNavBar()


// ── DESKTOP LAYOUT ────────────────────────────────────────────────────────────

let desktopView = 'today';

function isDesktop() { return window.innerWidth >= 768; }

function buildSidebarAreas() {
  const container = document.getElementById('sb-areas');
  if (!container) return;
  container.innerHTML = '';

  if (AREAS.length === 0) return;

  const title = document.createElement('div');
  title.className = 'sb-section-title';
  title.textContent = 'Areas';
  container.appendChild(title);

  AREAS.forEach(a => {
    const areaProjects = PROJECTS.filter(p => p.areaId === a.id);
    const wrap = document.createElement('div');
    wrap.className = 'sb-area';

    const hdr = document.createElement('div');
    hdr.className = 'sb-area-header';
    hdr.innerHTML = `
      <div class="sb-area-dot" style="background:${a.color}"></div>
      <span style="flex:1">${a.name}</span>
      ${areaProjects.length ? `<svg class="sb-area-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>` : ''}
    `;

    const projList = document.createElement('div');
    projList.className = 'sb-projects';

    areaProjects.forEach(p => {
      const pRow = document.createElement('div');
      pRow.className = 'sb-project';
      pRow.dataset.projectId = p.id;
      const doneTasks = tasks.filter(t => t.projectId === p.id && t.done).length;
      const totalTasks = tasks.filter(t => t.projectId === p.id).length;
      pRow.innerHTML = `
        <div class="sb-area-dot" style="background:${a.color};width:6px;height:6px"></div>
        <span style="flex:1">${p.name}</span>
        ${totalTasks ? `<span style="font-size:11px;color:var(--text-tertiary)">${totalTasks - doneTasks}</span>` : ''}
      `;
      pRow.addEventListener('click', () => switchDesktopView('project:' + p.id));
      projList.appendChild(pRow);
    });

    hdr.addEventListener('click', () => {
      if (areaProjects.length) {
        const chevron = hdr.querySelector('.sb-area-chevron');
        chevron && chevron.classList.toggle('open');
        projList.classList.toggle('open');
      } else {
        switchDesktopView('area:' + a.id);
      }
    });

    wrap.appendChild(hdr);
    if (areaProjects.length) wrap.appendChild(projList);
    container.appendChild(wrap);
  });
}

function updateSidebarCounts() {
  const todayCount = tasks.filter(t => t.due && isSameDay(t.due, today) && !t.done).length
                   + tasks.filter(t => t.due && t.due < today && !isSameDay(t.due, today) && !t.done).length;
  const inboxCount = inboxItems.length;
  const todayEl = document.getElementById('sb-count-today');
  const inboxEl = document.getElementById('sb-count-inbox');
  if (todayEl) todayEl.textContent = todayCount || '';
  if (inboxEl) inboxEl.textContent = inboxCount || '';
}

function switchDesktopView(view) {
  desktopView = view;

  // Update active state
  document.querySelectorAll('.sb-item').forEach(el => {
    el.classList.toggle('active', el.dataset.desktopView === view);
  });
  document.querySelectorAll('.sb-project').forEach(el => {
    el.classList.toggle('active', 'project:' + el.dataset.projectId === view);
  });

  renderDesktopContent();
}

function renderDesktopContent() {
  if (!isDesktop()) return;

  const titleEl    = document.getElementById('desktop-content-title');
  const subtitleEl = document.getElementById('desktop-content-subtitle');
  const scroll     = document.getElementById('desktop-scroll');
  const input      = document.getElementById('desktop-new-task-input');
  const newTaskBar = document.getElementById('desktop-new-task');

  if (!scroll) return;

  // Hide new-task bar on views where it doesn't apply
  const hideBar = ['settings', 'lists'].includes(desktopView);
  if (newTaskBar) newTaskBar.style.display = hideBar ? 'none' : 'flex';

  // Set placeholder based on view
  input.placeholder = 'New to-do';

  if (desktopView === 'today') {
    titleEl.textContent = 'Today';
    subtitleEl.textContent = today.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    scroll.innerHTML = '';

    // Overdue
    const overdue = tasks.filter(t => t.due && t.due < today && !isSameDay(t.due, today) && !t.done);
    if (overdue.length) {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.style.color = 'var(--overdue)';
      hdr.textContent = 'Overdue · ' + overdue.length;
      scroll.appendChild(hdr);
      overdue.forEach(t => scroll.appendChild(makeTaskRow(t, true)));
    }

    const todayTasks = tasks.filter(t => t.due && isSameDay(t.due, today));
    const todayEvents = events.filter(e => isSameDay(e.start, today));

    if (todayTasks.length || todayEvents.length) {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = 'Today';
      scroll.appendChild(hdr);
    }

    const sorted = [
      ...todayEvents.sort((a,b) => a.start - b.start),
      ...todayTasks.filter(t => !t.done),
    ];
    sorted.forEach(item => {
      if (item.type === 'event') scroll.appendChild(makeEventRow(item));
      else scroll.appendChild(makeTaskRow(item, false));
    });

    const done = todayTasks.filter(t => t.done);
    if (done.length) {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = 'Completed · ' + done.length;
      scroll.appendChild(hdr);
      done.forEach(t => scroll.appendChild(makeTaskRow(t, false)));
    }

    if (scroll.children.length === 0) {
      scroll.innerHTML = '<div class="inbox-empty"><p class="inbox-empty-title">Nothing for today</p><p>Enjoy your day.</p></div>';
    }

  } else if (desktopView === 'inbox') {
    titleEl.textContent = 'Inbox';
    subtitleEl.textContent = inboxItems.length + ' items';
    scroll.innerHTML = '';
    input.placeholder = 'Capture a thought…';

    if (inboxItems.length === 0) {
      scroll.innerHTML = '<div class="inbox-empty"><p class="inbox-empty-title">Inbox is empty</p><p>Type above or press N to capture.</p></div>';
    } else {
      inboxItems.forEach(item => {
        const row = makeTaskRow(item, false);
        scroll.appendChild(row);
      });
    }

  } else if (desktopView === 'upcoming') {
    titleEl.textContent = 'Upcoming';
    subtitleEl.textContent = 'Next 7 days';
    scroll.innerHTML = '';

    for (let i = 1; i <= 7; i++) {
      const dt = new Date(today);
      dt.setDate(today.getDate() + i);
      const dayTasks  = tasks.filter(t => t.due && isSameDay(t.due, dt) && !t.done);
      const dayEvents = events.filter(e => isSameDay(e.start, dt));
      if (!dayTasks.length && !dayEvents.length) continue;

      const hdr = document.createElement('div');
      hdr.className = 'upcoming-date-header';
      hdr.innerHTML = `<div class="date-label">${dt.toLocaleDateString('en-US',{weekday:'long'})}</div>
        <div class="date-sub">${dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>`;
      scroll.appendChild(hdr);
      [...dayEvents.sort((a,b)=>a.start-b.start), ...dayTasks].forEach(item => {
        if (item.type === 'event') scroll.appendChild(makeEventRow(item));
        else scroll.appendChild(makeTaskRow(item, false));
      });
    }

    if (scroll.children.length === 0) {
      scroll.innerHTML = '<div class="inbox-empty"><p class="inbox-empty-title">Nothing upcoming</p></div>';
    }

  } else if (desktopView === 'someday') {
    titleEl.textContent = 'Someday';
    subtitleEl.textContent = 'No due date tasks';
    scroll.innerHTML = '';
    const someday = tasks.filter(t => !t.due && !t.done);
    if (someday.length === 0) {
      scroll.innerHTML = '<div class="inbox-empty"><p class="inbox-empty-title">Nothing here yet</p><p>Tasks without a due date will appear here.</p></div>';
    } else {
      someday.forEach(t => scroll.appendChild(makeTaskRow(t, false)));
    }

  } else if (desktopView === 'lists') {
    titleEl.textContent = 'Lists';
    subtitleEl.textContent = lists.length + ' lists';
    // Render the mobile lists view inside desktop scroll
    scroll.innerHTML = '';
    const tmp = document.createElement('div');
    tmp.id = 'lists-list-desktop';
    scroll.appendChild(tmp);
    // Temporarily point renderLists to the desktop container
    const orig = document.getElementById('lists-list');
    orig.id = 'lists-list-orig';
    tmp.id = 'lists-list';
    renderLists();
    tmp.id = 'lists-list-desktop';
    orig.id = 'lists-list';

  } else if (desktopView === 'places') {
    titleEl.textContent = 'Places';
    subtitleEl.textContent = locations.length + ' places';
    scroll.innerHTML = '';
    const tmp = document.createElement('div');
    scroll.appendChild(tmp);
    const orig = document.getElementById('places-list');
    orig.id = 'places-list-orig';
    tmp.id = 'places-list';
    renderPlaces();
    tmp.id = 'places-list-desktop';
    orig.id = 'places-list';

  } else if (desktopView === 'settings') {
    titleEl.textContent = 'Settings';
    subtitleEl.textContent = '';
    scroll.innerHTML = '';
    const tmp = document.createElement('div');
    scroll.appendChild(tmp);
    // Swap ID so renderSettings targets this element
    const origSettings = document.getElementById('settings-list');
    if (origSettings) origSettings.id = 'settings-list-orig';
    tmp.id = 'settings-list';
    renderSettings();
    tmp.id = 'settings-list-desktop';
    if (origSettings) origSettings.id = 'settings-list';

  } else if (desktopView.startsWith('project:')) {
    const projId = desktopView.split(':')[1];
    const p = PROJECTS.find(pr => pr.id === projId);
    const a = p ? AREAS.find(ar => ar.id === p.areaId) : null;
    titleEl.textContent = p ? p.name : 'Project';
    subtitleEl.textContent = a ? a.name : '';
    scroll.innerHTML = '';

    const projTasks = tasks.filter(t => t.projectId === projId);
    const active = projTasks.filter(t => !t.done);
    const done   = projTasks.filter(t => t.done);

    if (active.length === 0 && done.length === 0) {
      scroll.innerHTML = '<div class="inbox-empty"><p class="inbox-empty-title">No tasks yet</p></div>';
    } else {
      active.forEach(t => scroll.appendChild(makeTaskRow(t, false)));
      if (done.length) {
        const hdr = document.createElement('div');
        hdr.className = 'section-header';
        hdr.textContent = 'Completed · ' + done.length;
        scroll.appendChild(hdr);
        done.forEach(t => scroll.appendChild(makeTaskRow(t, false)));
      }
    }

  } else if (desktopView.startsWith('area:')) {
    const areaId = desktopView.split(':')[1];
    const a = AREAS.find(ar => ar.id === areaId);
    titleEl.textContent = a ? a.name : 'Area';
    subtitleEl.textContent = PROJECTS.filter(p => p.areaId === areaId).length + ' projects';
    scroll.innerHTML = '';
    const areaProjects = PROJECTS.filter(p => p.areaId === areaId);
    areaProjects.forEach(p => {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = p.name;
      scroll.appendChild(hdr);
      tasks.filter(t => t.projectId === p.id && !t.done).forEach(t => scroll.appendChild(makeTaskRow(t, false)));
    });
  }

  updateSidebarCounts();
}

// Desktop new task input
function initDesktop() {
  if (!isDesktop()) return;

  if (!isFullMode()) desktopView = 'lists';
  buildSidebarAreas();
  updateSidebarCounts();
  renderDesktopContent();

  // Sidebar nav clicks
  document.querySelectorAll('.sb-item[data-desktop-view]').forEach(el => {
    el.addEventListener('click', () => switchDesktopView(el.dataset.desktopView));
  });

  // New task input
  const input = document.getElementById('desktop-new-task-input');

  function submitDesktopTask() {
    const text = input.value.trim();
    if (!text) return;

    if (desktopView === 'inbox') {
      // Inbox → inboxItems (no date)
      inboxItems.push({ id: 'i'+Date.now(), title: text, type: 'task', done: false, notes: '' });
    } else if (desktopView === 'someday') {
      // Someday → tasks with no due date
      tasks.push({ id: 't'+Date.now(), type: 'task', title: text, projectId: null,
        due: null, priority: false, done: false, notes: '' });
    } else if (desktopView.startsWith('project:')) {
      // Project → tasks assigned to that project
      const projId = desktopView.split(':')[1];
      tasks.push({ id: 't'+Date.now(), type: 'task', title: text, projectId: projId,
        due: null, priority: false, done: false, notes: '' });
    } else if (desktopView === 'upcoming') {
      // Upcoming → inbox (no specific day chosen)
      inboxItems.push({ id: 'i'+Date.now(), title: text, type: 'task', done: false, notes: '' });
    } else {
      // Today and everything else → task due today
      tasks.push({ id: 't'+Date.now(), type: 'task', title: text, projectId: null,
        due: new Date(today), priority: false, done: false, notes: '' });
    }

    save();
    input.value = '';
    buildSidebarAreas();
    updateSidebarCounts();
    renderDesktopContent();
  }

  if (input) {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitDesktopTask();
    });

    // Also allow clicking the + icon next to the input
    const newTaskBar = document.getElementById('desktop-new-task');
    if (newTaskBar) {
      newTaskBar.addEventListener('click', e => {
        input.focus();
      });
    }

    // N key to focus input from anywhere
    document.addEventListener('keydown', e => {
      if (!isDesktop()) return;
      if (e.key === 'n' && !e.metaKey && !e.ctrlKey &&
          document.activeElement.tagName !== 'INPUT' &&
          document.activeElement.tagName !== 'TEXTAREA') {
        e.preventDefault();
        input.focus();
      }
    });
  }

  // "New To-Do" sidebar button
  const sbNew = document.getElementById('sb-new-btn');
  if (sbNew) {
    sbNew.addEventListener('click', () => {
      const input = document.getElementById('desktop-new-task-input');
      if (input) input.focus();
    });
  }
}

// Re-render desktop when refreshCurrentView is called
const _origRefresh = refreshCurrentView;
refreshCurrentView = function() {
  if (isDesktop()) {
    buildSidebarAreas();
    renderDesktopContent();
    updateSidebarCounts();
    applyUIMode();
  } else {
    _origRefresh();
  }
};

// ── INIT ──────────────────────────────────────────────────────────────────────

loadAll();
applyUIMode();
if (isDesktop()) {
  initDesktop();
} else {
  // Click first visible nav tab on startup
  const firstTab = document.querySelector('#top-nav .nav-tab[data-view]');
  if (firstTab) firstTab.click();
  else { buildWeekStrip(); renderTodayList(); }
}

let _desktopInited = isDesktop();
window.addEventListener('resize', () => {
  const nowDesktop = isDesktop();
  if (nowDesktop && !_desktopInited) {
    _desktopInited = true;
    initDesktop();
  } else if (nowDesktop) {
    renderDesktopContent();
  } else if (!nowDesktop && _desktopInited) {
    _desktopInited = false;
    buildWeekStrip();
    renderTodayList();
  }
  applyUIMode();
});
</script>
